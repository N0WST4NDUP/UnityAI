behaviors:
  BallControl:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 12000
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    network_settings:
      normalize: true        # 관측값 범위가 다양해서 normalize 필요
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.995          # 장기 보상 중시 (오래 버틸수록 좋은 태스크)
        strength: 1.0
    max_steps: 10
    time_horizon: 1000
    summary_freq: 10000
